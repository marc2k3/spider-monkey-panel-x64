name: build
on:
  push:
    branches: main
    paths-ignore:
      - '**/*.md'
      - '**/*.js'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v6

    - name: Set up MSBuild
      uses: microsoft/setup-msbuild@v3
      
    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
        key: a44707152fabbedcf1c17fe80d7bfb7d9370d8d5

    - name: Set up vcpkg
      working-directory: C:\vcpkg
      run: |
        git pull && bootstrap-vcpkg && vcpkg integrate install
        vcpkg install cpr fmt miniz nlohmann-json wil wtl --triplet x64-windows-static

    - name: Build
      run: msbuild workspace\foo_spider_monkey_panel.slnx /p:PlatformToolset=v143
      
    - name: Upload pdb
      uses: actions/upload-artifact@v7
      with:
        name: debug_symbols
        path: component/foo_spider_monkey_panel.pdb

    - name: Delete pdb
      run: del component/foo_spider_monkey_panel.pdb

    - name: Upload component folder
      uses: actions/upload-artifact@v7
      with:
        name: foo_spider_monkey_panel-${{ github.sha }}
        path: component
